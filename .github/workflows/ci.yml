# V2 CI pipeline (Frontend Architecture §17, Roadmap Phase 1).
# Order is the frozen gate sequence: typecheck → lint → validate:content →
# unit → build → e2e → LHCI.
#
# The LHCI step is ADVISORY (continue-on-error) until Phase 12 ships the first
# real page — the frozen §14 budgets (100/100/100/≥99, CLS 0) are asserted
# verbatim in lighthouserc.json and cannot pass on the noindex Phase-0
# placeholder. The roadmap makes them blocking at milestone M3.

name: CI

on:
  push:
    branches: [v2, main]
  pull_request:
    branches: [v2, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validate content (stub until Phase 15)
        run: npm run validate:content

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Lighthouse CI (advisory until Phase 12 / M3)
        run: npx lhci autorun
        continue-on-error: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
